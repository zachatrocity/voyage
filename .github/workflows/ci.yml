name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  android-apk:
    name: Android debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Dioxus CLI (dx)
        shell: bash
        run: |
          curl -fsSL -o /tmp/dx.tar.gz \
            "https://github.com/DioxusLabs/dioxus/releases/download/v0.7.3/dx-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf /tmp/dx.tar.gz -C /usr/local/bin
          dx --version

      - name: Require stable debug keystore on main builds
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
        run: |
          if [[ -z "$DEBUG_KEYSTORE" ]]; then
            echo "ERROR: secrets.DEBUG_KEYSTORE is required for reproducible installable dev upgrades." >&2
            echo "Without it, each CI run generates a new debug signing key and Android treats updates as a different signer." >&2
            exit 1
          fi

      - name: Restore debug keystore (when provided)
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
        run: |
          if [[ -z "$DEBUG_KEYSTORE" ]]; then
            echo "DEBUG_KEYSTORE not set; using runner default debug keystore."
            exit 0
          fi
          mkdir -p ~/.android
          echo "$DEBUG_KEYSTORE" | base64 -d > ~/.android/debug.keystore

      - name: Build debug APK (arm64)
        run: dx build --platform android --target aarch64-linux-android

      - name: Patch generated Android project (version + debug signing)
        env:
          VOYAGE_VERSION_CODE: ${{ github.run_number }}
          VOYAGE_VERSION_NAME: ci-${{ github.run_number }}-${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          gradle = Path("target/dx/voyage/debug/android/app/app/build.gradle.kts")
          if not gradle.exists():
              raise SystemExit(f"Generated gradle file not found: {gradle}")

          text = gradle.read_text()
          text = text.replace("versionCode = 1", f"versionCode = {os.environ['VOYAGE_VERSION_CODE']}")
          text = text.replace('versionName = "1.0"', f'versionName = "{os.environ["VOYAGE_VERSION_NAME"]}"')

          if 'create("debug")' not in text:
              marker = "    buildTypes {"
              signing_block = (
                  "    signingConfigs {\n"
                  "        create(\"debug\") {\n"
                  "            storeFile = file(System.getProperty(\"user.home\") + \"/.android/debug.keystore\")\n"
                  "            storePassword = \"android\"\n"
                  "            keyAlias = \"androiddebugkey\"\n"
                  "            keyPassword = \"android\"\n"
                  "        }\n"
                  "    }\n"
              )
              text = text.replace(marker, signing_block + marker)

          text = text.replace(
              "getByName(\"debug\") {",
              "getByName(\"debug\") {\n            signingConfig = signingConfigs.getByName(\"debug\")",
          )

          gradle.write_text(text)
          print(f"Patched {gradle}")
          PY

      - name: Rebuild debug APK with patched metadata/signing
        run: |
          cd target/dx/voyage/debug/android/app
          ./gradlew --no-daemon :app:assembleDebug

      - name: Locate APK
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH=$(find target/dx -type f -name "*.apk" | head -n 1)
          if [[ -z "${APK_PATH}" ]]; then
            echo "No APK found under target/dx/" >&2
            find target/dx -maxdepth 8 -type f | sed 's/^/ - /'
            exit 1
          fi
          echo "APK_PATH=${APK_PATH}" >> $GITHUB_ENV

      - name: Print APK package/signing metadata
        shell: bash
        run: |
          set -euxo pipefail
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n1)
          AAPT=$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -n1)
          "$APKSIGNER" verify --print-certs "$APK_PATH"
          "$AAPT" dump badging "$APK_PATH" | grep -E "package:|versionCode|versionName"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voyage-android-debug-arm64
          path: ${{ env.APK_PATH }}
