name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  android-apk:
    name: Android debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Dioxus CLI (dx)
        shell: bash
        run: |
          curl -fsSL -o /tmp/dx.tar.gz \
            "https://github.com/DioxusLabs/dioxus/releases/download/v0.7.3/dx-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf /tmp/dx.tar.gz -C /usr/local/bin
          dx --version

      - name: Restore debug keystore
        if: ${{ env.DEBUG_KEYSTORE != '' }}
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
        run: |
          mkdir -p ~/.android
          echo "$DEBUG_KEYSTORE" | base64 -d > ~/.android/debug.keystore

      - name: Build debug APK (arm64)
        run: dx build --platform android --target aarch64-linux-android

      - name: Locate APK
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH=$(find target/dx -type f -name "*.apk" | head -n 1)
          if [[ -z "${APK_PATH}" ]]; then
            echo "No APK found under target/dx/" >&2
            find target/dx -maxdepth 8 -type f | sed 's/^/ - /'
            exit 1
          fi
          echo "APK_PATH=${APK_PATH}" >> $GITHUB_ENV

      - name: Upload APK
        id: upload_apk
        uses: actions/upload-artifact@v4
        with:
          name: voyage-android-debug-arm64
          path: ${{ env.APK_PATH }}

      - name: Comment artifact URL on PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const artifactId = `${{ steps.upload_apk.outputs.artifact-id }}`;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = artifactId
              ? `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifactId}`
              : runUrl;

            const body = [
              `@zachatrocity ✅ Android debug APK build finished.`,
              '',
              `Download artifact: ${artifactUrl}`,
              `Run details: ${runUrl}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
