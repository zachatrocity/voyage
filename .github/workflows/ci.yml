name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  android-apk:
    name: Android debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Dioxus CLI (dx)
        shell: bash
        run: |
          curl -fsSL -o /tmp/dx.tar.gz \
            "https://github.com/DioxusLabs/dioxus/releases/download/v0.7.3/dx-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf /tmp/dx.tar.gz -C /usr/local/bin
          dx --version

      - name: Build debug APK (arm64)
        run: dx build --platform android --target aarch64-linux-android

      - name: Locate APK
        shell: bash
        run: |
          set -euxo pipefail
          APK_PATH=$(find dist -type f -name "*.apk" | head -n 1)
          if [[ -z "${APK_PATH}" ]]; then
            echo "No APK found under dist/" >&2
            find dist -maxdepth 6 -type f | sed 's/^/ - /'
            exit 1
          fi
          echo "APK_PATH=${APK_PATH}" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voyage-android-debug-arm64
          path: ${{ env.APK_PATH }}
